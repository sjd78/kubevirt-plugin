name: POC Hot Cluster E2E CI Test 2

on:
  workflow_dispatch:
    inputs:
      test_spec:
        description: 'Cypress test spec to run'
        required: true
        default: 'tests/gating.cy.ts'
        type: string

permissions:
  contents: read
  actions: read

env:
  BRIDGE_BASE_ADDRESS: 'http://localhost:9000'
  CYPRESS_CNV_NS: 'kubevirt-hyperconverged'
  CYPRESS_OS_IMAGES_NS: 'kubevirt-os-images'
  CYPRESS_TEST_NS: 'kubevirt-plugin-ci-test-${{ github.run_id }}'
  CYPRESS_TEST_SECRET_NAME: 'ci-test-secret'

jobs:
  run-gating-tests:
    name: Run Gating Tests
    runs-on: kubevirt-plugin-ci
    timeout-minutes: 120
    env:
      CYPRESS_CNV_NS: 'kubevirt-hyperconverged'
      CYPRESS_OS_IMAGES_NS: 'kubevirt-os-images'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check the running container environment
        # shell: bash -x {0}
        run: |
          echo "*** checking environment ***"
          env | sort
          df -h
          id
          ls -l / /home /home/runner
          echo "this is a test" > ${HOME}/test-file || echo "creating ${HOME}test-file failed"

          echo "*** checking tools ***"
          for cmd in kubectl oc virtctl podman jq curl; do
            if command -v "$cmd" &>/dev/null; then
              echo "  $cmd: found"
            else
              echo "  $cmd: not found"
            fi
          done

          for cmd in kubectl oc virtctl; do
            if command -v "$cmd" &>/dev/null; then
              if "$cmd" version; then
                echo "  $cmd version: OK"
              else
                echo "  $cmd version: FAILED (exit $?)"
              fi
            else
              echo "  $cmd: not found"
            fi
          done

      - name: Build kubevirt-plugin image
        run: |
          podman build -t kubevirt-plugin:ci -f Dockerfile .

      - name: Setup required cluster resources
        run: |
          bash test-setup.sh

      # TODO: Either use the setup-node action with caching, or add explicit caching
      - name: Install dependencies
        run: |
          npm config list -l
          npm ci --ignore-scripts --verbose --no-audit

      - name: Start kubevirt-plugin container
        run: |
          podman run -d --rm --name kubevirt-plugin -p 9001:80 kubevirt-plugin:ci
          echo "Waiting for plugin at http://localhost:9001..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:9001/ | grep -q 200; then break; fi
            [ "$i" -eq 30 ] && (echo "Plugin did not become ready"; exit 1)
            sleep 2
          done

      - name: Start the "off cluster" console
        run: |
          bash start-console.sh &
          echo "Waiting for console at ${BRIDGE_BASE_ADDRESS}..."
          for i in $(seq 1 60); do
            if curl -s -o /dev/null -w "%{http_code}" "${BRIDGE_BASE_ADDRESS}/" | grep -qE '200|301|302'; then break; fi
            [ "$i" -eq 60 ] && (echo "Console did not become ready"; exit 1)
            sleep 5
          done

      - name: Run Cypress gating tests
        env:
          BRIDGE_BASE_ADDRESS: 'http://localhost:9000'
        run: |
          npm run test-cypress-headless -- --spec="${{ inputs.test_spec }}"

      - name: Stop the "off cluster" console and plugin
        if: always()
        run: |
          bash stop-console.sh

      - name: Generate test report
        if: always()
        run: npm run cypress-postreport || true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-results-${{ github.run_id }}
          path: |
            cypress/gui-test-screenshots/
            cypress/videos/
            cypress/results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Collect cluster diagnostics on failure
        if: failure()
        run: |
          mkdir -p /tmp/cluster-diagnostics
          oc cluster-info dump > /tmp/cluster-diagnostics/cluster_info.json 2>/dev/null || true
          oc get pods -n kubevirt-hyperconverged -o wide > /tmp/cluster-diagnostics/hco_pods.txt 2>/dev/null || true
          oc get nodes -o wide > /tmp/cluster-diagnostics/nodes.txt 2>/dev/null || true
          oc get events -n "${CYPRESS_TEST_NS}" --sort-by='.lastTimestamp' > /tmp/cluster-diagnostics/test_ns_events.txt 2>/dev/null || true

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cluster-diagnostics-${{ github.run_id }}
          path: /tmp/cluster-diagnostics/
          retention-days: 7
          if-no-files-found: ignore

      - name: Cleanup cluster resources
        if: always()
        run: |
          export TEST_NS="${CYPRESS_TEST_NS}"
          bash test-cleanup.sh || echo "Cleanup encountered errors (non-fatal)"
          oc delete namespace "${CYPRESS_TEST_NS}" --wait=false 2>/dev/null || true
          oc cluster-info

      - name: Test summary
        if: always()
        run: |
          echo "## Gating Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test Spec | \`${{ inputs.test_spec }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test Namespace | \`${CYPRESS_TEST_NS}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | \`${{ job.status }}\` |" >> "$GITHUB_STEP_SUMMARY"
